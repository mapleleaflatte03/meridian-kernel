name: Mirror Redirect (Feature)
description: This repo is a mirror. Open feature requests in the canonical monorepo.
labels: ["redirect"]
body:
  - type: markdown
    attributes:
      value: |
        This repository is a mirror.
        Please open this request in the monorepo:
        https://github.com/mapleleaflatte03/meridian/issues/new/choose
  - type: input
    id: canonical_target
    attributes:
      label: Canonical module path
      placeholder: kernel/
    validations:
      required: true
