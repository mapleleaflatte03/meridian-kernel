name: Kernel Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Initialize economy ledger
        run: |
          python3 quickstart.py --init-only
          touch kernel/authority_queue.json kernel/court_records.json economy/transactions.jsonl economy/revenue.json

      - name: Run test suite
        env:
          PYTHONPATH: .
        run: python3 -m unittest discover kernel/tests -p 'test_*.py' -v

      - name: Run governance simulation
        env:
          PYTHONPATH: .
        run: python3 examples/simulate_governance.py
