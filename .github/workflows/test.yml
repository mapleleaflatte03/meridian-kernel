name: Kernel Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run test suite
        working-directory: kernel/tests
        run: PYTHONPATH=.. python -m unittest discover -s . -p 'test_*.py' -v

      - name: Run root-level tests
        run: PYTHONPATH=. python -m unittest discover -s . -p 'test_quickstart.py' -v

      - name: Run governance simulation
        run: PYTHONPATH=. python examples/simulate_governance.py
