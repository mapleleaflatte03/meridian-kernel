name: Kernel Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Initialize workspace and ledger
        run: |
          rm -rf capsules/ economy/capsules/ economy/ledger.json economy/transactions.jsonl economy/payout_plan_preview_queue.json kernel/agent_registry.json kernel/authority_queue.json kernel/court_records.json kernel/organizations.json
          python quickstart.py --init-only

      - name: Run test suite
        run: |
          export PYTHONPATH=.
          python -m unittest discover kernel/tests -p 'test_*.py' -v || true

      - name: Run governance simulation
        run: python examples/simulate_governance.py
